# This is generated by AI
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # mainブランチにpushされた時だけ実行（masterの場合は変更してください）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # 使用しているNode.jsのバージョンに合わせる

      - name: Install dependencies
        run: npm install

      - name: Static HTML generation
        run: npm run generate # 静的サイトとしてビルド（.output/public が生成される）

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public # Nuxt3のデフォルトの出力先を指定

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
